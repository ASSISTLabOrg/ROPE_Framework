name: Cleanup

# Purge GitHub Actions caches for branches that no longer exist.
# Runs every 24 hours and can also be triggered manually.

on:
  schedule:
    - cron: '0 */24 * * *'
  workflow_dispatch:

permissions:
  actions: write   # list and delete caches
  contents: read   # list branches (required when explicit permissions are set)

jobs:
  purge-stale-caches:
    name: Purge caches for deleted branches
    runs-on: ubuntu-latest
    steps:
      - name: Delete stale caches
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;

            // Fetch all action caches (paginated).
            let caches;
            try {
              caches = await github.paginate(
                github.rest.actions.getActionsCacheList,
                { owner, repo, per_page: 100 }
              );
            } catch (err) {
              core.setFailed(`Failed to list caches: ${err.message}`);
              return;
            }

            // Fetch all live branches.
            let branches;
            try {
              branches = await github.paginate(
                github.rest.repos.listBranches,
                { owner, repo, per_page: 100 }
              );
            } catch (err) {
              core.setFailed(`Failed to list branches: ${err.message}`);
              return;
            }

            const liveRefs = new Set(
              branches.map(b => `refs/heads/${b.name}`)
            );

            let deleted = 0;
            let kept    = 0;

            for (const cache of caches) {
              const ref = cache.ref ?? '';

              // Keep caches for live branches.
              if (liveRefs.has(ref)) { kept++; continue; }

              // Keep caches for tags (used by the release workflow).
              if (ref.startsWith('refs/tags/')) { kept++; continue; }

              try {
                await github.rest.actions.deleteActionsCacheById({
                  owner, repo, cache_id: cache.id
                });
                core.info(
                  `Deleted: [${cache.id}] ${cache.key} (${ref || 'no ref'})`
                );
                deleted++;
              } catch (err) {
                core.warning(
                  `Failed to delete cache ${cache.id}: ${err.message}`
                );
              }
            }

            core.info(`Done — deleted ${deleted} stale, kept ${kept}.`);
