name: _build-linux

on:
  workflow_call:
    inputs:
      hardware:
        description: "ROPE_HARDWARE value (cpu, cuda12)"
        required: true
        type: string
      use_libtorch:
        description: "-DROPE_USE_LIBTORCH"
        required: true
        type: boolean
      build_tests:
        description: "-DROPE_BUILD_TESTS and whether to run ctest/pytest"
        required: true
        type: boolean
      run_dotnet_tests:
        description: "Install .NET 8 SDK and run the C# test suite"
        required: true
        type: boolean
      dotnet_pack_smoke:
        description: "Run a dotnet pack smoke check (CI-only; release.yml has its own pack-dotnet job)"
        required: false
        type: boolean
        default: false
      save_cache:
        description: "Save the deps cache after a successful build"
        required: true
        type: boolean
      release_version:
        description: "-DROPE_RELEASE_VERSION (empty for non-release builds)"
        required: false
        type: string
        default: ""
      package_suffix:
        description: "-DROPE_PACKAGE_SUFFIX, also used for the artifact path glob"
        required: true
        type: string
      artifact_name:
        description: "Name of the uploaded artifact"
        required: true
        type: string
      cache_key:
        description: "actions/cache key for build/_deps"
        required: true
        type: string

jobs:
  build:
    name: Linux (x86_64, ${{ inputs.hardware }})
    runs-on: ubuntu-22.04
    container: debian:bookworm
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          apt-get update
          apt-get install -y ninja-build gcc-12 g++-12 make ca-certificates python3-pip wget
          pip3 install --quiet --break-system-packages "cmake>=4.2" pytest

      - name: Install .NET 8 SDK
        if: ${{ inputs.run_dotnet_tests || inputs.dotnet_pack_smoke }}
        run: |
          wget -qO /tmp/dotnet-install.sh https://dot.net/v1/dotnet-install.sh
          bash /tmp/dotnet-install.sh --channel 8.0 --install-dir /usr/local/dotnet
          echo "/usr/local/dotnet" >> "$GITHUB_PATH"

      - name: Restore cached deps
        uses: actions/cache/restore@v4
        with:
          path: build/_deps
          key: ${{ inputs.cache_key }}

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc-12 \
            -DCMAKE_CXX_COMPILER=g++-12 \
            -DROPE_DOWNLOAD_DEPS=ON \
            -DROPE_HARDWARE=${{ inputs.hardware }} \
            -DROPE_USE_LIBTORCH=${{ inputs.use_libtorch && 'ON' || 'OFF' }} \
            ${{ inputs.build_tests && '-DROPE_BUILD_TESTS=ON' || '' }} \
            -DROPE_PACKAGE_SUFFIX=${{ inputs.package_suffix }} \
            -DROPE_RELEASE_VERSION=${{ inputs.release_version }}

      - name: Build
        run: cmake --build build --parallel

      - name: Test (C++)
        if: ${{ inputs.build_tests }}
        run: ctest --test-dir build --output-on-failure

      - name: Test (Python)
        if: ${{ inputs.build_tests }}
        run: |
          export ROPE_EXE="$(pwd)/build/rope"
          export ROPE_FIXTURE_DIR="$(pwd)/tests/fixtures"
          pytest tests/python/ -v

      - name: Test (C#)
        if: ${{ inputs.run_dotnet_tests }}
        run: |
          export ROPE_LIB="$(pwd)/build/librope.so"
          export ROPE_EXE="$(pwd)/build/rope"
          export ROPE_FIXTURE_DIR="$(pwd)/tests/fixtures"
          dotnet test tests/dotnet/RopeTests.csproj --logger "console;verbosity=normal"
        env:
          DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: "1"

      - name: Pack (C#)
        if: ${{ inputs.dotnet_pack_smoke }}
        run: |
          cmake --install build --prefix /tmp/pack-smoke-install
          mkdir -p /tmp/pack-smoke-native
          cp /tmp/pack-smoke-install/bin/rope /tmp/pack-smoke-native/rope.bin
          cp /tmp/pack-smoke-install/lib/*.so* /tmp/pack-smoke-native/
          dotnet pack dotnet/Rope.csproj -c Release -o nupkg \
            -p:Version=0.0.0-packsmoke \
            -p:RopeNativeDir=/tmp/pack-smoke-native
        env:
          DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: "1"

      - name: Pack smoke test (consume)
        if: ${{ inputs.dotnet_pack_smoke }}
        run: |
          cat > /tmp/pack-smoke-rope.conf <<CONF
          [paths]
          exported_dir = $(pwd)/tests/fixtures/test_models
          driver_path  = $(pwd)/tests/fixtures/test_models/sw_test.swbin
          [server]
          idle_timeout_seconds = 30
          CONF

          dotnet restore tests/dotnet/PackSmokeConsumer/PackSmokeConsumer.csproj \
            -p:RopeSmokeTestVersion=0.0.0-packsmoke \
            -p:RestoreAdditionalProjectSources="$(pwd)/nupkg"

          dotnet build tests/dotnet/PackSmokeConsumer/PackSmokeConsumer.csproj -c Release --no-restore

          for tfm in net48 net8.0; do
            test -f "tests/dotnet/PackSmokeConsumer/bin/Release/$tfm/librope.so" || {
              echo "::error::librope.so missing from $tfm build output — packaging regression"
              exit 1
            }
          done

          dotnet tests/dotnet/PackSmokeConsumer/bin/Release/net8.0/PackSmokeConsumer.dll /tmp/pack-smoke-rope.conf
        env:
          DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: "1"

      - name: Package
        run: cpack --config build/CPackConfig.cmake

      - name: Save deps cache
        if: always() && inputs.save_cache
        uses: actions/cache/save@v4
        with:
          path: build/_deps
          key: ${{ inputs.cache_key }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: rope_framework-*-${{ inputs.package_suffix }}.tar.gz
          retention-days: 1
