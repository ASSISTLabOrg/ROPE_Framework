name: _build-linux

on:
  workflow_call:
    inputs:
      hardware:
        description: "ROPE_HARDWARE value (cpu, cuda12)"
        required: true
        type: string
      use_libtorch:
        description: "-DROPE_USE_LIBTORCH"
        required: true
        type: boolean
      build_tests:
        description: "-DROPE_BUILD_TESTS and whether to run ctest/pytest"
        required: true
        type: boolean
      run_dotnet_tests:
        description: "Install .NET 8 SDK and run the C# test suite"
        required: true
        type: boolean
      dotnet_pack_smoke:
        description: "Run a dotnet pack smoke check (CI-only; release.yml has its own pack-dotnet job)"
        required: false
        type: boolean
        default: false
      save_cache:
        description: "Save the deps cache after a successful build"
        required: true
        type: boolean
      release_version:
        description: "-DROPE_RELEASE_VERSION (empty for non-release builds)"
        required: false
        type: string
        default: ""
      package_suffix:
        description: "-DROPE_PACKAGE_SUFFIX, also used for the artifact path glob"
        required: true
        type: string
      artifact_name:
        description: "Name of the uploaded artifact"
        required: true
        type: string
      cache_key:
        description: "actions/cache key for build/_deps"
        required: true
        type: string

jobs:
  build:
    name: Linux (x86_64, ${{ inputs.hardware }})
    runs-on: ubuntu-22.04
    container: debian:bookworm
    steps:
      - uses: actions/checkout@v4

      # act doesn't inject Node.js into custom job containers (unlike GitHub's
      # hosted runners), so JS actions like actions/cache fail without this.
      - name: Install Node.js (act only)
        if: ${{ env.ACT }}
        run: |
          apt-get update
          apt-get install -y nodejs

      - name: Install build tools
        run: |
          apt-get update
          apt-get install -y ninja-build gcc-12 g++-12 make ca-certificates python3-pip wget
          pip3 install --quiet --break-system-packages "cmake>=4.2" pytest

      - name: Install .NET 8 SDK
        if: ${{ inputs.run_dotnet_tests }}
        run: |
          wget -qO /tmp/dotnet-install.sh https://dot.net/v1/dotnet-install.sh
          bash /tmp/dotnet-install.sh --channel 8.0 --install-dir /usr/local/dotnet
          echo "/usr/local/dotnet" >> "$GITHUB_PATH"

      - name: Restore cached deps
        uses: actions/cache/restore@v4
        with:
          path: build/_deps
          key: ${{ inputs.cache_key }}

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc-12 \
            -DCMAKE_CXX_COMPILER=g++-12 \
            -DROPE_DOWNLOAD_DEPS=ON \
            -DROPE_HARDWARE=${{ inputs.hardware }} \
            -DROPE_USE_LIBTORCH=${{ inputs.use_libtorch && 'ON' || 'OFF' }} \
            ${{ inputs.build_tests && '-DROPE_BUILD_TESTS=ON' || '' }} \
            -DROPE_PACKAGE_SUFFIX=${{ inputs.package_suffix }} \
            -DROPE_RELEASE_VERSION=${{ inputs.release_version }}

      - name: Build
        run: cmake --build build --parallel

      - name: Test (C++)
        if: ${{ inputs.build_tests }}
        run: ctest --test-dir build --output-on-failure

      - name: Test (Python)
        if: ${{ inputs.build_tests }}
        run: pytest tests/python/ -v
        env:
          ROPE_EXE:         ${{ github.workspace }}/build/rope
          ROPE_FIXTURE_DIR: ${{ github.workspace }}/tests/fixtures

      - name: Test (C#)
        if: ${{ inputs.run_dotnet_tests }}
        run: dotnet test tests/dotnet/RopeTests.csproj --logger "console;verbosity=normal"
        env:
          DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: "1"
          ROPE_LIB:         ${{ github.workspace }}/build/librope.so
          ROPE_EXE:         ${{ github.workspace }}/build/rope
          ROPE_FIXTURE_DIR: ${{ github.workspace }}/tests/fixtures

      # Smoke check: catches Rope.csproj/packaging regressions on every push.
      # Bundles this job's Linux binaries via the default RopeNativeDir; the
      # multi-platform release package is built separately in release.yml.
      - name: Pack (C#)
        if: ${{ inputs.dotnet_pack_smoke }}
        run: dotnet pack dotnet/Rope.csproj -c Release -o nupkg
        env:
          DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: "1"

      - name: Package
        run: cpack --config build/CPackConfig.cmake

      # Save cache only on main — feature branches restore but never write,
      # so total cache entries stay capped at one per variant.
      - name: Save deps cache
        if: always() && inputs.save_cache
        uses: actions/cache/save@v4
        with:
          path: build/_deps
          key: ${{ inputs.cache_key }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: rope_framework-*-${{ inputs.package_suffix }}.tar.gz
          retention-days: 1
