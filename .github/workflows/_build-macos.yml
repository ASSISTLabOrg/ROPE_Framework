name: _build-macos

on:
  workflow_call:
    inputs:
      hardware:
        description: "ROPE_HARDWARE value (cpu, cuda12)"
        required: true
        type: string
      use_libtorch:
        description: "-DROPE_USE_LIBTORCH"
        required: true
        type: boolean
      build_tests:
        description: "-DROPE_BUILD_TESTS and whether to run ctest/pytest"
        required: true
        type: boolean
      run_dotnet_tests:
        description: "Set up the .NET 8 SDK and run the C# test suite"
        required: true
        type: boolean
      dotnet_pack_smoke:
        description: "Run a dotnet pack smoke check (CI-only; release.yml has its own pack-dotnet job)"
        required: false
        type: boolean
        default: false
      save_cache:
        description: "Save the deps cache after a successful build"
        required: true
        type: boolean
      release_version:
        description: "-DROPE_RELEASE_VERSION (empty for non-release builds)"
        required: false
        type: string
        default: ""
      package_suffix:
        description: "-DROPE_PACKAGE_SUFFIX, also used for the artifact path glob"
        required: true
        type: string
      artifact_name:
        description: "Name of the uploaded artifact"
        required: true
        type: string
      cache_key:
        description: "actions/cache key for build/_deps"
        required: true
        type: string

jobs:
  build:
    name: macOS (arm64, ${{ inputs.hardware }})
    runs-on: macos-14
    env:
      MACOSX_DEPLOYMENT_TARGET: "12.0"
    steps:
      - uses: actions/checkout@v4

      - name: Install CMake 4.x and libomp
        run: |
          pip3 install --quiet --break-system-packages "cmake>=4.2" pytest
          brew install libomp

      - name: Setup .NET 8 SDK
        if: ${{ inputs.run_dotnet_tests || inputs.dotnet_pack_smoke }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore cached deps
        uses: actions/cache/restore@v4
        with:
          path: build/_deps
          key: ${{ inputs.cache_key }}

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DROPE_DOWNLOAD_DEPS=ON \
            -DROPE_HARDWARE=${{ inputs.hardware }} \
            -DROPE_USE_LIBTORCH=${{ inputs.use_libtorch && 'ON' || 'OFF' }} \
            ${{ inputs.build_tests && '-DROPE_BUILD_TESTS=ON' || '' }} \
            -DROPE_PACKAGE_SUFFIX=${{ inputs.package_suffix }} \
            -DROPE_RELEASE_VERSION=${{ inputs.release_version }}

      - name: Build
        run: cmake --build build --parallel

      - name: Test (C++)
        if: ${{ inputs.build_tests }}
        run: ctest --test-dir build --output-on-failure

      - name: Test (Python)
        if: ${{ inputs.build_tests }}
        run: pytest tests/python/ -v
        env:
          ROPE_EXE:         ${{ github.workspace }}/build/rope
          ROPE_FIXTURE_DIR: ${{ github.workspace }}/tests/fixtures

      - name: Test (C#)
        if: ${{ inputs.run_dotnet_tests }}
        run: dotnet test tests/dotnet/RopeTests.csproj --logger "console;verbosity=normal"
        env:
          ROPE_LIB:         ${{ github.workspace }}/build/librope.dylib
          ROPE_EXE:         ${{ github.workspace }}/build/rope
          ROPE_FIXTURE_DIR: ${{ github.workspace }}/tests/fixtures

      # Smoke check: catches Rope.csproj/packaging regressions on every push.
      # Stages from an actual `cmake --install` prefix, not the raw build/
      # tree, so DLL/dylib resolution matches what a real downloaded
      # package ships (see _build-linux.yml for the longer rationale).
      # macOS's CLI binary is named "rope" with no extension, same as
      # Linux's, but they aren't interchangeable — renamed to "rope-osx.bin"
      # to coexist with Linux's "rope.bin" in a merged release nupkg (see
      # Rope.csproj / Rope.cs's ResolveExePath OSX branch).
      - name: Pack (C#)
        if: ${{ inputs.dotnet_pack_smoke }}
        run: |
          cmake --install build --prefix /tmp/pack-smoke-install
          mkdir -p /tmp/pack-smoke-native
          cp /tmp/pack-smoke-install/bin/rope /tmp/pack-smoke-native/rope-osx.bin
          cp /tmp/pack-smoke-install/lib/*.dylib /tmp/pack-smoke-native/
          dotnet pack dotnet/Rope.csproj -c Release -o nupkg \
            -p:Version=0.0.0-packsmoke \
            -p:RopeNativeDir=/tmp/pack-smoke-native

      # Consumes the just-packed nupkg exactly like a real end user would
      # (PackageReference, no libPath/exePath). Only builds (doesn't run)
      # the net48 target — there's no .NET Framework runtime on macOS to
      # execute it with, same constraint as the Linux smoke test.
      - name: Pack smoke test (consume)
        if: ${{ inputs.dotnet_pack_smoke }}
        run: |
          cat > /tmp/pack-smoke-rope.conf <<CONF
          [paths]
          exported_dir = ${{ github.workspace }}/tests/fixtures/test_models
          driver_path  = ${{ github.workspace }}/tests/fixtures/test_models/sw_test.swbin
          [server]
          idle_timeout_seconds = 30
          CONF

          dotnet restore tests/dotnet/PackSmokeConsumer/PackSmokeConsumer.csproj \
            -p:RopeSmokeTestVersion=0.0.0-packsmoke \
            --source "${{ github.workspace }}/nupkg" \
            --source https://api.nuget.org/v3/index.json

          dotnet build tests/dotnet/PackSmokeConsumer/PackSmokeConsumer.csproj -c Release --no-restore

          for tfm in net48 net8.0; do
            test -f "tests/dotnet/PackSmokeConsumer/bin/Release/$tfm/librope.dylib" || {
              echo "::error::librope.dylib missing from $tfm build output — packaging regression"
              exit 1
            }
          done

          dotnet tests/dotnet/PackSmokeConsumer/bin/Release/net8.0/PackSmokeConsumer.dll /tmp/pack-smoke-rope.conf

      - name: Package
        run: cpack --config build/CPackConfig.cmake

      - name: Save deps cache
        if: always() && inputs.save_cache
        uses: actions/cache/save@v4
        with:
          path: build/_deps
          key: ${{ inputs.cache_key }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: rope_framework-*-${{ inputs.package_suffix }}.tar.gz
          retention-days: 1
