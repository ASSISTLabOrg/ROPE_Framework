name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build-linux:
    name: Linux (x86_64, cpu)
    uses: ./.github/workflows/_build-linux.yml
    with:
      hardware: cpu
      use_libtorch: true
      build_tests: true
      run_dotnet_tests: true
      save_cache: true
      release_version: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
      package_suffix: linux-x86_64-cpu
      artifact_name: rope-linux-x86_64-cpu
      cache_key: deps-linux-x64-cpu-ort1.25.0-torch2.7.0

  build-macos-arm64:
    name: macOS (arm64, cpu)
    uses: ./.github/workflows/_build-macos.yml
    with:
      hardware: cpu
      use_libtorch: true
      build_tests: true
      run_dotnet_tests: true
      save_cache: true
      release_version: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
      package_suffix: macos-arm64-cpu
      artifact_name: rope-macos-arm64-cpu
      cache_key: deps-macos-arm64-cpu-ort1.25.0-torch2.7.0

  build-linux-cuda12:
    name: Linux (x86_64, cuda12)
    uses: ./.github/workflows/_build-linux.yml
    with:
      hardware: cuda12
      use_libtorch: false
      build_tests: true
      run_dotnet_tests: true
      save_cache: true
      release_version: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
      package_suffix: linux-x86_64-cuda12
      artifact_name: rope-linux-x86_64-cuda12
      cache_key: deps-linux-x64-cuda12-ort1.25.0

  build-windows:
    name: Windows (x64, cpu)
    uses: ./.github/workflows/_build-windows.yml
    with:
      hardware: cpu
      use_libtorch: true
      build_tests: true
      run_dotnet_tests: true
      save_cache: true
      release_version: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
      package_suffix: windows-x64-cpu
      artifact_name: rope-windows-x64-cpu
      cache_key: deps-windows-x64-cpu-ort1.25.0-torch2.7.0

  build-windows-cuda12:
    name: Windows (x64, cuda12)
    uses: ./.github/workflows/_build-windows.yml
    with:
      hardware: cuda12
      use_libtorch: false
      build_tests: true
      run_dotnet_tests: true
      save_cache: true
      release_version: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
      package_suffix: windows-x64-cuda12
      artifact_name: rope-windows-x64-cuda12
      cache_key: deps-windows-x64-cuda12-ort1.25.0

  pack-dotnet:
    name: Pack .NET (NuGet)
    needs: [build-linux, build-windows, build-macos-arm64]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - uses: actions/download-artifact@v4
        with:
          name: rope-linux-x86_64-cpu
          path: artifacts/linux
      - uses: actions/download-artifact@v4
        with:
          name: rope-windows-x64-cpu
          path: artifacts/windows
      - uses: actions/download-artifact@v4
        with:
          name: rope-macos-arm64-cpu
          path: artifacts/macos

      - name: Extract native binaries
        run: |
          mkdir -p native
          tar -xzf artifacts/linux/rope_framework-*.tar.gz -C artifacts/linux
          unzip -q artifacts/windows/rope_framework-*.zip -d artifacts/windows
          tar -xzf artifacts/macos/rope_framework-*.tar.gz -C artifacts/macos
          find artifacts/linux   -path '*/lib/*.so*'           -exec cp {} native/ \;
          find artifacts/macos   -path '*/lib/*.dylib'         -exec cp {} native/ \;
          find artifacts/linux   -path '*/bin/rope'            -exec cp {} native/rope.bin \;
          find artifacts/macos   -path '*/bin/rope'            -exec cp {} native/rope-osx.bin \;
          find artifacts/windows -path '*/bin/*' \( -iname '*.dll' -o -iname '*.exe' \) -exec cp {} native/ \;
          ls native/

      - name: Pack
        run: |
          VERSION_FLAG=""
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION_FLAG="-p:Version=${GITHUB_REF_NAME#v}"
          fi
          dotnet pack dotnet/Rope.csproj -c Release -o nupkg \
            -p:RopeNativeDir="${{ github.workspace }}/native" $VERSION_FLAG

      - uses: actions/upload-artifact@v4
        with:
          name: rope-dotnet-nupkg
          path: nupkg/*.nupkg
          retention-days: 1

  publish:
    name: Publish GitHub Release
    needs: [build-linux, build-linux-cuda12, build-macos-arm64, build-windows, build-windows-cuda12, pack-dotnet]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          generate_release_notes: true
          body: |
            ## Required assets

            The following directories are not included in the release archives and must be downloaded separately:

            - `data/models/` — model artifacts
            - `data/drivers/` — driver/space-weather data

            **Downloads:** [Google Drive](https://drive.google.com/drive/folders/1gVQ0gqzwfKDaZIuT8tWoCyWQOL_hT4Ol?usp=drive_link)

            Place both folders alongside the extracted archive before running the server.

      - name: Delete staging artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const { data: { artifacts } } =
              await github.rest.actions.listWorkflowRunArtifacts({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                run_id: context.runId,
              });
            for (const artifact of artifacts) {
              if (artifact.name.startsWith('rope-')) {
                await github.rest.actions.deleteArtifact({
                  owner:       context.repo.owner,
                  repo:        context.repo.repo,
                  artifact_id: artifact.id,
                });
                core.info(`Deleted: ${artifact.name}`);
              }
            }
