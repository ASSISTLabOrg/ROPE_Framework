name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-linux:
    name: Linux (x86_64, cpu)
    runs-on: ubuntu-22.04
    container: debian:bullseye
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: |
          apt-get update
          apt-get install -y cmake ninja-build gcc-10 g++-10 make ca-certificates
      - uses: actions/cache@v4
        with:
          path: build/_deps
          key: deps-linux-x64-cpu-ort1.25.0-torch2.7.0
      - run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc-10 \
            -DCMAKE_CXX_COMPILER=g++-10 \
            -DROPE_DOWNLOAD_DEPS=ON \
            -DROPE_HARDWARE=cpu \
            -DROPE_USE_LIBTORCH=OFF \
            -DROPE_PACKAGE_SUFFIX=linux-x86_64-cpu
      - run: cmake --build build --parallel
      - run: cpack --config build/CPackConfig.cmake
      - uses: actions/upload-artifact@v4
        with:
          name: rope-linux-x86_64-cpu
          path: rope_framework-*.tar.gz

  build-macos-arm64:
    name: macOS (arm64, cpu)
    runs-on: macos-14
    env:
      MACOSX_DEPLOYMENT_TARGET: "12.0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: build/_deps
          key: deps-macos-arm64-cpu-ort1.25.0-torch2.7.0
      - run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DROPE_DOWNLOAD_DEPS=ON \
            -DROPE_HARDWARE=cpu \
            -DROPE_USE_LIBTORCH=OFF \
            -DROPE_PACKAGE_SUFFIX=macos-arm64-cpu
      - run: cmake --build build --parallel
      - run: cpack --config build/CPackConfig.cmake
      - uses: actions/upload-artifact@v4
        with:
          name: rope-macos-arm64-cpu
          path: rope_framework-*.tar.gz

  build-macos-x86_64:
    name: macOS (x86_64, cpu)
    runs-on: macos-13
    env:
      MACOSX_DEPLOYMENT_TARGET: "12.0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: build/_deps
          key: deps-macos-x86_64-cpu-ort1.25.0-torch2.7.0
      - run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DROPE_DOWNLOAD_DEPS=ON \
            -DROPE_HARDWARE=cpu \
            -DROPE_USE_LIBTORCH=OFF \
            -DROPE_PACKAGE_SUFFIX=macos-x86_64-cpu
      - run: cmake --build build --parallel
      - run: cpack --config build/CPackConfig.cmake
      - uses: actions/upload-artifact@v4
        with:
          name: rope-macos-x86_64-cpu
          path: rope_framework-*.tar.gz

  build-linux-cuda12:
    name: Linux (x86_64, cuda12)
    runs-on: ubuntu-22.04
    container: debian:bullseye
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: |
          apt-get update
          apt-get install -y cmake ninja-build gcc-10 g++-10 make ca-certificates
      - uses: actions/cache@v4
        with:
          path: build/_deps
          key: deps-linux-x64-cuda12-ort1.25.0
      - run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc-10 \
            -DCMAKE_CXX_COMPILER=g++-10 \
            -DROPE_DOWNLOAD_DEPS=ON \
            -DROPE_HARDWARE=cuda12 \
            -DROPE_USE_LIBTORCH=OFF \
            -DROPE_PACKAGE_SUFFIX=linux-x86_64-cuda12
      - run: cmake --build build --parallel
      - run: cpack --config build/CPackConfig.cmake
      - uses: actions/upload-artifact@v4
        with:
          name: rope-linux-x86_64-cuda12
          path: rope_framework-*.tar.gz

  build-linux-rocm6:
    name: Linux (x86_64, rocm6)
    runs-on: ubuntu-22.04
    container: debian:bullseye
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: |
          apt-get update
          apt-get install -y cmake ninja-build gcc-10 g++-10 make ca-certificates wget python3-pip unzip
      - name: Acquire ORT ROCm libs
        run: |
          wget -qO /tmp/ort-cpu.tgz \
            https://github.com/microsoft/onnxruntime/releases/download/v1.25.0/onnxruntime-linux-x64-1.25.0.tgz
          mkdir -p /opt/ort-rocm
          tar -xzf /tmp/ort-cpu.tgz -C /opt/ort-rocm --strip-components=1

          pip3 install --quiet --upgrade pip
          pip3 download --no-deps "onnxruntime-rocm==1.25.0" -d /tmp/rocm-whl
          unzip -q /tmp/rocm-whl/onnxruntime_rocm-*.whl -d /tmp/rocm-unpack
          find /tmp/rocm-unpack -name 'libonnxruntime*.so*' \
            -exec cp -a {} /opt/ort-rocm/lib/ \;
      - run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc-10 \
            -DCMAKE_CXX_COMPILER=g++-10 \
            -DROPE_HARDWARE=rocm6 \
            -DROPE_USE_LIBTORCH=OFF \
            -DORT_INC=/opt/ort-rocm/include \
            -DORT_LIB=/opt/ort-rocm/lib/libonnxruntime.so \
            -DROPE_PACKAGE_SUFFIX=linux-x86_64-rocm6
      - run: cmake --build build --parallel
      - run: cpack --config build/CPackConfig.cmake
      - uses: actions/upload-artifact@v4
        with:
          name: rope-linux-x86_64-rocm6
          path: rope_framework-*.tar.gz

  build-windows:
    name: Windows (x64, cpu)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: build/_deps
          key: deps-windows-x64-cpu-ort1.25.0-torch2.7.0
      - run: |
          cmake -B build `
            -G "Visual Studio 17 2022" -A x64 `
            -DROPE_DOWNLOAD_DEPS=ON `
            -DROPE_HARDWARE=cpu `
            -DROPE_USE_LIBTORCH=OFF `
            -DROPE_PACKAGE_SUFFIX=windows-x64-cpu
      - run: cmake --build build --config Release --parallel
      - run: cpack --config build/CPackConfig.cmake -C Release
      - uses: actions/upload-artifact@v4
        with:
          name: rope-windows-x64-cpu
          path: rope_framework-*.zip

  publish:
    name: Publish GitHub Release
    needs: [build-linux, build-linux-cuda12, build-linux-rocm6, build-macos-arm64, build-macos-x86_64, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          generate_release_notes: true
