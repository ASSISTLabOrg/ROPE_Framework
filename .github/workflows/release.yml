name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      test_all_platforms:
        description: "Run tests on all platforms (not just Linux cpu)"
        type: boolean
        default: false

jobs:
  build-linux:
    name: Linux (x86_64, cpu)
    runs-on: ubuntu-22.04
    container: debian:bookworm
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: |
          apt-get update
          apt-get install -y ninja-build gcc-12 g++-12 make ca-certificates python3-pip
          pip3 install --quiet --break-system-packages "cmake>=4.2"
      - uses: actions/cache@v4
        with:
          path: build/_deps
          key: deps-linux-x64-cpu-ort1.25.0-torch2.7.0
      - run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc-12 \
            -DCMAKE_CXX_COMPILER=g++-12 \
            -DROPE_DOWNLOAD_DEPS=ON \
            -DROPE_HARDWARE=cpu \
            -DROPE_USE_LIBTORCH=ON \
            -DROPE_BUILD_TESTS=ON \
            -DROPE_PACKAGE_SUFFIX=linux-x86_64-cpu \
            -DROPE_RELEASE_VERSION=${{ github.ref_name }}
      - run: cmake --build build --parallel
      - name: Test (C++)
        run: ctest --test-dir build --output-on-failure
      - name: Test (Python)
        run: pip3 install --quiet --break-system-packages pytest && pytest tests/python/ -v
      - run: cpack --config build/CPackConfig.cmake
      - uses: actions/upload-artifact@v4
        with:
          name: rope-linux-x86_64-cpu
          path: rope_framework-*.tar.gz

  build-macos-arm64:
    name: macOS (arm64, cpu)
    runs-on: macos-14
    env:
      MACOSX_DEPLOYMENT_TARGET: "12.0"
    steps:
      - uses: actions/checkout@v4
      - name: Install CMake 4.x
        run: pip3 install --quiet --break-system-packages "cmake>=4.2"
      - uses: actions/cache@v4
        with:
          path: build/_deps
          key: deps-macos-arm64-cpu-ort1.25.0-torch2.7.0
      - run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DROPE_DOWNLOAD_DEPS=ON \
            -DROPE_HARDWARE=cpu \
            -DROPE_USE_LIBTORCH=ON \
            ${{ inputs.test_all_platforms == true && '-DROPE_BUILD_TESTS=ON' || '' }} \
            -DROPE_PACKAGE_SUFFIX=macos-arm64-cpu \
            -DROPE_RELEASE_VERSION=${{ github.ref_name }}
      - run: cmake --build build --parallel
      - name: Test (C++)
        if: ${{ inputs.test_all_platforms == true }}
        run: ctest --test-dir build --output-on-failure
      - name: Test (Python)
        if: ${{ inputs.test_all_platforms == true }}
        run: pip3 install --quiet --break-system-packages pytest && pytest tests/python/ -v
      - run: cpack --config build/CPackConfig.cmake
      - uses: actions/upload-artifact@v4
        with:
          name: rope-macos-arm64-cpu
          path: rope_framework-*.tar.gz

  build-linux-cuda12:
    name: Linux (x86_64, cuda12)
    runs-on: ubuntu-22.04
    container: debian:bookworm
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: |
          apt-get update
          apt-get install -y ninja-build gcc-12 g++-12 make ca-certificates python3-pip
          pip3 install --quiet --break-system-packages "cmake>=4.2"
      - uses: actions/cache@v4
        with:
          path: build/_deps
          key: deps-linux-x64-cuda12-ort1.25.0
      - run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc-12 \
            -DCMAKE_CXX_COMPILER=g++-12 \
            -DROPE_DOWNLOAD_DEPS=ON \
            -DROPE_HARDWARE=cuda12 \
            -DROPE_USE_LIBTORCH=OFF \
            ${{ inputs.test_all_platforms == true && '-DROPE_BUILD_TESTS=ON' || '' }} \
            -DROPE_PACKAGE_SUFFIX=linux-x86_64-cuda12 \
            -DROPE_RELEASE_VERSION=${{ github.ref_name }}
      - run: cmake --build build --parallel
      - name: Test (C++)
        if: ${{ inputs.test_all_platforms == true }}
        run: ctest --test-dir build --output-on-failure
      - name: Test (Python)
        if: ${{ inputs.test_all_platforms == true }}
        run: pip3 install --quiet --break-system-packages pytest && pytest tests/python/ -v
      - run: cpack --config build/CPackConfig.cmake
      - uses: actions/upload-artifact@v4
        with:
          name: rope-linux-x86_64-cuda12
          path: rope_framework-*.tar.gz

  build-windows:
    name: Windows (x64, cpu)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - name: Install CMake 4.x
        run: pip install --quiet --break-system-packages "cmake>=4.2"
      - uses: actions/cache@v4
        with:
          path: build/_deps
          key: deps-windows-x64-cpu-ort1.25.0-torch2.7.0
      - run: |
          cmake -B build `
            -G "Visual Studio 17 2022" -A x64 `
            -DROPE_DOWNLOAD_DEPS=ON `
            -DROPE_HARDWARE=cpu `
            -DROPE_USE_LIBTORCH=OFF `
            ${{ inputs.test_all_platforms == true && '-DROPE_BUILD_TESTS=ON' || '' }} `
            -DROPE_PACKAGE_SUFFIX=windows-x64-cpu `
            -DROPE_RELEASE_VERSION=${{ github.ref_name }}
      - run: cmake --build build --config Release --parallel
      - name: Test (C++)
        if: ${{ inputs.test_all_platforms == true }}
        run: ctest --test-dir build -C Release --output-on-failure
      - name: Test (Python)
        if: ${{ inputs.test_all_platforms == true }}
        run: pip install --quiet pytest && pytest tests/python/ -v
      - run: cpack --config build/CPackConfig.cmake -C Release
      - uses: actions/upload-artifact@v4
        with:
          name: rope-windows-x64-cpu
          path: rope_framework-*.zip

  publish:
    name: Publish GitHub Release
    needs: [build-linux, build-linux-cuda12, build-macos-arm64, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          generate_release_notes: true
          body: |
            ## Required assets

            The following directories are not included in the release archives and must be downloaded separately:

            - `models/` — model artifacts
            - `data/` — space weather database, IC table, and normalisation statistics

            **Download:** [Google Drive](https://drive.google.com/placeholder)

            Place both folders alongside the extracted archive before running the server.
