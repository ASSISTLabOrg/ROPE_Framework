# rope.conf — ROPE C++ runtime configuration
#
# Relative paths are resolved relative to this config file's directory.
# Use absolute paths if you need to point outside the project tree.

# ---------------------------------------------------------------------------
[session]
# ---------------------------------------------------------------------------

# mode = repl     : interactive REPL (default)
# mode = oneshot  : run the forecast defined in [forecast] and [query], then exit
mode = oneshot

# ---------------------------------------------------------------------------
[paths]
# ---------------------------------------------------------------------------

# Directory produced by export_models.py (contains *.onnx + *.bin files).
exported_dir = ../exported

# Space-weather database (sw_celestrack_1957.csv or equivalent).
driver_csv = ../data/sw_celestrack_1957.csv

# Initial-conditions table.
ic_csv = ../data/IC_Table_modified.csv


# ---------------------------------------------------------------------------
[socket]
# ---------------------------------------------------------------------------
# Only used when session.mode = socket.
#
# path    : Unix domain socket path.  The file is created on startup and
#           removed on clean exit (SIGINT / SIGTERM).
path = /tmp/rope.sock
#
# start   : Forecast start datetime (UTC, rounded to hour).
start = 2024-02-09 00:00:00
#
# horizon : Forecast length in hours.  The entire window is held in memory;
#           queries outside this window return err time_out_of_range.
horizon = 120


# ---------------------------------------------------------------------------
[threads]
# ---------------------------------------------------------------------------

# ORT intra-op threads for the 15 base models and the meta model.
# 1 is typically best here because OpenMP already parallelises across models.
intra_threads_base = 1

# ORT intra-op threads for the COAE decoder (conv-heavy, benefits from all
# available cores).  Set to 0 to use hardware_concurrency() automatically.
intra_threads_decoder = 0

