# forecast_job.conf — Upper Atmosphere Density Forecast Job Configuration
# -------------------------------------------------------------------------
# Pass this file to the forecast binary with:
#   ./build/examples/forecast --config config/forecast_job.conf
# Individual CLI flags (e.g. --start-time) override values set here.


[models]
# Paths to the compiled ONNX model files produced by your training pipeline.
predictor = ./predictor.onnx
decoder   = ./decoder.onnx
# encoder is optional; used only for reconstruction validation.
# encoder = /path/to/encoder.onnx


[forecast]
# Forecast start time in UTC.  Accepted formats:
#   YYYY-MM-DDTHH:MM:SSZ   (ISO 8601, preferred)
#   YYYY-MM-DD HH:MM:SS
start_time = 2025-01-15T12:00:00Z

# Length of the forecast window, in minutes.
# Examples: 60 = 1 hour,  360 = 6 hours,  1440 = 24 hours
forecast_length = 360


[inference]
# Number of CPU threads used by ONNX Runtime (0 = auto-detect).
num_threads = 4

# Set to true to enable GPU execution (requires a CUDA-capable device and
# a GPU-enabled ONNX Runtime build).
use_gpu = false

# GPU device index (ignored when use_gpu = false).
gpu_device_id = 0


[output]
# Path for the binary output file.
# Leave empty to auto-generate a name based on start_time and forecast_length,
# e.g. forecast_20250115_1200_360min.bin
output =
