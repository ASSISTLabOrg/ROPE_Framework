# rope.conf — ROPE runtime configuration (demo)
#
# Relative paths are resolved relative to this config file's directory.

# ---------------------------------------------------------------------------
[paths]
# ---------------------------------------------------------------------------

exported_dir = ../models/exported
driver_csv   = ../data/sw_celestrack_1957.csv
ic_csv       = ../data/IC_Table_modified.csv


# ---------------------------------------------------------------------------
[threads]
# ---------------------------------------------------------------------------

intra_threads_base    = 1
intra_threads_meta    = 0
intra_threads_decoder = 0


# ---------------------------------------------------------------------------
[decoder]
# ---------------------------------------------------------------------------

device = cpu


# ---------------------------------------------------------------------------
[forecast]
# ---------------------------------------------------------------------------

# Uncertainty calculation is disabled for the demo — it is slow and the
# demo only needs density estimates, not the full UT uncertainty envelope.
compute_uncertainty = false
