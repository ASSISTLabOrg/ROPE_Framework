[server]
connect=1 ; Connect to external? If 0, will run in serial mode on local
address=127.0.0.1 ; Address of external server
port=8888 ; Port of external server

[model] ; WARNING: ONLY USED IF CONNECT=0 (local-serial mode)
type=SINDYc ; model type
file=data/SINDYc_tiegcm_hrd.h5 ; filepath for the model inputs

[transformer] ; WARNING: ONLY USED IF CONNECT=0 (local-serial mode)
type=PCA ; data transformer type
file=data/PCA_tiegcm_hrd.h5

[solver] ; WARNING: ONLY USED IF CONNECT=0 (local-serial mode)
timestep=0.5 ; timestep of the solver (hours)
kp_index=0 ; index of Kp in the driver array